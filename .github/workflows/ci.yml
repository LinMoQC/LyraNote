name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  # ── Frontend typecheck & lint ───────────────────────────────────────────────
  web-quality:
    name: Web — Typecheck & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm exec tsc --noEmit

      - name: ESLint
        run: pnpm exec next lint

      - name: Frontend tests
        run: pnpm test

  # ── API tests ───────────────────────────────────────────────────────────────
  api-tests:
    name: API — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lyranote
          POSTGRES_PASSWORD: lyranote
          POSTGRES_DB: lyranote_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt ruff

      - name: Ruff lint
        run: ruff check .

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://lyranote:lyranote@localhost:5432/lyranote_test
        run: alembic upgrade head

      - name: Unit & integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://lyranote:lyranote@localhost:5432/lyranote_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key
          STORAGE_BACKEND: local
          STORAGE_LOCAL_PATH: /tmp/lyranote-test-storage
          OPENAI_API_KEY: sk-test
        run: pytest tests/ -v --tb=short --ignore=tests/e2e

      - name: E2E API tests
        env:
          DATABASE_URL: postgresql+asyncpg://lyranote:lyranote@localhost:5432/lyranote_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key
          STORAGE_BACKEND: local
          STORAGE_LOCAL_PATH: /tmp/lyranote-test-storage
          OPENAI_API_KEY: sk-test
        run: pytest tests/e2e -v --tb=short
