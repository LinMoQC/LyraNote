name: Bug Report
description: Report a bug or unexpected behavior in LyraNote
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill in as much detail as possible.

  - type: checkboxes
    id: existing-issues
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have read the [README](https://github.com/LinMoQC/LyraNote#readme) and troubleshooting section
          required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose (./lyra start)
        - Local dev mode (./lyra dev)
        - Production (docker-compose.prod.yml)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
      placeholder: When I do X, Y happens instead of Z...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Enter '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Run `./lyra logs` and paste relevant output. Logs are automatically formatted.
      render: shell

  - type: input
    id: version
    attributes:
      label: LyraNote version / commit
      placeholder: e.g. main@a1b2c3d or v1.0.0
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide environment details.
      placeholder: |
        - OS: macOS 14.5 / Ubuntu 22.04 / Windows 11
        - Docker version: 27.x
        - Browser (for UI issues): Chrome 130
        - LLM provider: OpenAI / custom endpoint
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, related issues, or anything else that might help.
