# 宿主机 Nginx：反代到 Docker 映射端口（与 docker-compose.prod.yml 一致）。
# 示例：sudo cp nginx.system.example.conf /etc/nginx/sites-available/lyranote
#       sudo ln -s /etc/nginx/sites-available/lyranote /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# 逻辑与仓库内 nginx.prod.conf（曾用于容器内 Nginx）相同，仅 upstream 改为本机环回。

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream lyranote_web {
    server 127.0.0.1:3000;
}

upstream lyranote_monitoring {
    server 127.0.0.1:3100;
}

upstream lyranote_api {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://lyranote_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }

    location = /health {
        proxy_pass http://lyranote_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 建议为 /ops 额外启用 Basic Auth 或 IP allowlist，这里只演示反代。
    location /ops/ {
        proxy_pass http://lyranote_monitoring;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }

    location / {
        proxy_pass http://lyranote_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }
}
