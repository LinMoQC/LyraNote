services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: lyranote
      POSTGRES_PASSWORD: lyranote
      POSTGRES_DB: lyranote
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lyranote"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: lyranote
      MINIO_ROOT_PASSWORD: lyranote123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 lyranote lyranote123 &&
      mc mb -p local/lyranote || true
      "

  api:
    build:
      context: ./api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://lyranote:lyranote@db:5432/lyranote
      REDIS_URL: redis://redis:6379/0
      STORAGE_S3_ENDPOINT_URL: http://minio:9000
      STORAGE_S3_PUBLIC_URL: http://localhost:9000
      APP_BASE_URL: http://localhost:8000
      API_PREFIX: /api/v1
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      DEBUG: "false"
    volumes:
      - storage_data:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./api
    restart: unless-stopped
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://lyranote:lyranote@db:5432/lyranote
      REDIS_URL: redis://redis:6379/0
      STORAGE_S3_ENDPOINT_URL: http://minio:9000
      STORAGE_S3_PUBLIC_URL: http://localhost:9000
      APP_BASE_URL: http://localhost:8000
      API_PREFIX: /api/v1
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      DEBUG: "false"
    volumes:
      - storage_data:/app/storage
    depends_on:
      api:
        condition: service_healthy
    command: celery -A app.workers.tasks.celery_app worker --loglevel=info --concurrency=4

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: ./web/.env.local
        required: false
    environment:
      # SSR 服务端请求走 Docker 内网，避免容器内 localhost ECONNREFUSED
      INTERNAL_API_BASE_URL: http://api:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  storage_data:
  minio_data:
