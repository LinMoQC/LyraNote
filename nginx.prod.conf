# 容器内 Nginx 用（docker 网络上 web:3000 / api:8000）。宿主机反代请用 nginx.system.example.conf。
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream lyranote_web {
    server web:3000;
}

upstream lyranote_monitoring {
    server monitoring:3000;
}

upstream lyranote_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://lyranote_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }

    location = /health {
        proxy_pass http://lyranote_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ops/ {
        proxy_pass http://lyranote_monitoring;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }

    location / {
        proxy_pass http://lyranote_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }
}
