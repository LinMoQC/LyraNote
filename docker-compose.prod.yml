services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: lyranote
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lyranote}
      POSTGRES_DB: lyranote
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lyranote"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-lyranote}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-lyranote123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-lyranote} ${MINIO_ROOT_PASSWORD:-lyranote123} &&
      mc mb -p local/lyranote || true
      "

  api:
    image: ghcr.io/linmoqc/lyranote/api:main
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://lyranote:${POSTGRES_PASSWORD:-lyranote}@db:5432/lyranote
      REDIS_URL: redis://redis:6379/0
      STORAGE_S3_ENDPOINT_URL: http://minio:9000
      STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-lyranote}
      STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-lyranote123}
      STORAGE_S3_BUCKET: lyranote
      STORAGE_S3_REGION: us-east-1
      APP_BASE_URL: ${APP_BASE_URL:-https://your-domain.com}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      FRONTEND_URL: ${FRONTEND_URL:-https://your-domain.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://your-domain.com}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRE_DAYS: ${JWT_EXPIRE_DAYS:-30}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      MEMORY_MODE: ${MEMORY_MODE:-server}
      DEBUG: ${DEBUG:-false}
    volumes:
      - storage_data:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    image: ghcr.io/linmoqc/lyranote/api:main
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://lyranote:${POSTGRES_PASSWORD:-lyranote}@db:5432/lyranote
      REDIS_URL: redis://redis:6379/0
      STORAGE_S3_ENDPOINT_URL: http://minio:9000
      STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-lyranote}
      STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-lyranote123}
      STORAGE_S3_BUCKET: lyranote
      STORAGE_S3_REGION: us-east-1
      APP_BASE_URL: ${APP_BASE_URL:-https://your-domain.com}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      FRONTEND_URL: ${FRONTEND_URL:-https://your-domain.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://your-domain.com}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRE_DAYS: ${JWT_EXPIRE_DAYS:-30}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      MEMORY_MODE: ${MEMORY_MODE:-server}
      DEBUG: ${DEBUG:-false}
    volumes:
      - storage_data:/app/storage
    depends_on:
      api:
        condition: service_healthy
    command: celery -A app.workers.tasks.celery_app worker --loglevel=info --concurrency=4

  web:
    image: ghcr.io/linmoqc/lyranote/web:main
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      INTERNAL_API_BASE_URL: http://api:8000/api/v1
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # 使用 127.0.0.1：Next 监听 0.0.0.0（IPv4）；localhost 在部分环境会优先走 ::1 导致探测失败
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  storage_data:
  minio_data:
