services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: lyranote
      POSTGRES_PASSWORD: hk845828235
      POSTGRES_DB: lyranote
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lyranote"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: lyranote
      MINIO_ROOT_PASSWORD: hk845828235
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 lyranote hk845828235 &&
      mc mb -p local/lyranote || true
      "

  api:
    image: ghcr.io/linmoqc/lyranote/api:main
    restart: unless-stopped
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://lyranote:hk845828235@db:5432/lyranote?ssl=disable
      REDIS_URL: redis://redis:6379/0
      STORAGE_S3_ENDPOINT_URL: http://minio:9000
      STORAGE_S3_ACCESS_KEY: lyranote
      STORAGE_S3_SECRET_KEY: hk845828235
      STORAGE_S3_BUCKET: lyranote
      STORAGE_S3_REGION: us-east-1
      APP_BASE_URL: https://agent.linmoe.cn
      API_PREFIX: /api/v1
      FRONTEND_URL: https://lyra.linmoe.cn
      CORS_ORIGINS: https://lyra.linmoe.cn
      DEBUG: "false"
    volumes:
      - storage_data:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    image: ghcr.io/linmoqc/lyranote/api:main
    restart: unless-stopped
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://lyranote:hk845828235@db:5432/lyranote?ssl=disable
      REDIS_URL: redis://redis:6379/0
      STORAGE_S3_ENDPOINT_URL: http://minio:9000
      STORAGE_S3_ACCESS_KEY: lyranote
      STORAGE_S3_SECRET_KEY: hk845828235
      STORAGE_S3_BUCKET: lyranote
      STORAGE_S3_REGION: us-east-1
      APP_BASE_URL: https://agent.linmoe.cn
      API_PREFIX: /api/v1
      FRONTEND_URL: https://lyra.linmoe.cn
      CORS_ORIGINS: https://lyra.linmoe.cn
      DEBUG: "false"
    volumes:
      - storage_data:/app/storage
    depends_on:
      api:
        condition: service_healthy
    command: celery -A app.workers.tasks.celery_app worker --loglevel=info --concurrency=4

  web:
    image: ghcr.io/linmoqc/lyranote/web:main
    restart: unless-stopped
    env_file:
      - path: ./web/.env.local
        required: false
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      INTERNAL_API_BASE_URL: http://api:8000/api/v1
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  storage_data:
  minio_data:
