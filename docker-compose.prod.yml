services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: lyranote
      POSTGRES_PASSWORD: lyranote       # ⚠️ 生产必改，同步修改下方 DATABASE_URL
      POSTGRES_DB: lyranote
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lyranote"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: lyranote
      MINIO_ROOT_PASSWORD: lyranote123  # ⚠️ 生产必改，同步修改下方 STORAGE_S3_SECRET_KEY
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 lyranote lyranote123 &&
      mc mb -p local/lyranote || true
      "

  api:
    build:
      context: ./api
    restart: unless-stopped
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://lyranote:lyranote@db:5432/lyranote
      REDIS_URL: redis://redis:6379/0
      STORAGE_S3_ENDPOINT_URL: http://minio:9000
      APP_BASE_URL: https://${APP_DOMAIN:-localhost}
      FRONTEND_URL: https://${APP_DOMAIN:-localhost}
      CORS_ORIGINS: https://${APP_DOMAIN:-localhost}
      DEBUG: "false"
    volumes:
      - storage_data:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./api
    restart: unless-stopped
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://lyranote:lyranote@db:5432/lyranote
      REDIS_URL: redis://redis:6379/0
      STORAGE_S3_ENDPOINT_URL: http://minio:9000
      APP_BASE_URL: https://${APP_DOMAIN:-localhost}
      FRONTEND_URL: https://${APP_DOMAIN:-localhost}
      CORS_ORIGINS: https://${APP_DOMAIN:-localhost}
      DEBUG: "false"
    volumes:
      - storage_data:/app/storage
    depends_on:
      api:
        condition: service_healthy
    command: celery -A app.workers.tasks.celery_app worker --loglevel=info --concurrency=4

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
    restart: unless-stopped
    env_file:
      - ./web/.env.local
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      # SSR 服务端请求走 Docker 内网，避免容器内相对路径解析失败
      INTERNAL_API_BASE_URL: http://api:8000/api/v1
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  storage_data:
  minio_data:
